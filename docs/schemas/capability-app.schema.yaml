apiVersion: zeus.os/v1alpha1
kind: CapabilityAppSchema
metadata:
  name: capability-app
spec:
  required:
    apiVersion: zeus.os/v1alpha1
    kind: CapabilityApp
    metadata:
      name: non-empty string
    spec:
      kind: one of [watchdog, skill-set, mcp, tool, a2a, channel]
      entrypoint: non-empty string
      compatibilityBridge:
        legacyRoot: optional compatibility root; currently only skills
        legacyName: optional legacy capability name
        mode: optional compatibility mode; currently read-only-metadata
        runtimeWiring: must be false for declaration-only bridges
      legacyScripts:
        - path: repo-relative path under scripts/
          role: one of [watchdog, tool, renderer, quality-gate, installer]
          migration: classify-only
  notes:
    - Capability apps are declarative mount points.
    - Moving existing runtime files into apps/ requires a separate migration gate.
    - compatibilityBridge declares metadata only; runtime callers require a separate review gate.
    - legacyScripts classifies existing scripts without moving or wiring them.

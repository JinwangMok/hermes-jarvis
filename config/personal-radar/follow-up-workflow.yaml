version: 2026-04-26
statuses: [new, triaged, watching, action_recommended, applied, dismissed, expired]
alert_classes:
  action_required:
    condition: high user-fit plus deadline/action window or required manual check
    max_frequency: immediate but deduplicated
  breaking:
    condition: major policy/R&D/AI-cloud change with strategic impact
    max_frequency: immediate but source-confirmed
  daily_digest:
    condition: useful but not urgent items
    max_frequency: daily
required_fields:
  - item_id
  - title
  - source_id
  - official_url
  - category
  - why_it_matters_to_jinwang
  - fit_score
  - urgency_score
  - confidence
  - missing_user_info
  - recommended_next_action
  - deadline_or_window
  - next_check_date
  - status
eligibility_language:
  allowed: [검토 필요, 가능성 있음, 공식 확인 필요, 조건 미상]
  forbidden_without_official_confirmation: [신청 가능 확정, 자격 충족 확정]
